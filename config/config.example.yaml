# SMC 聪明钱追踪系统 — 配置示例
# 复制为 config/config.yaml 后修改（config.yaml 已被 .gitignore，不会进仓库）。
# 纯公开数据系统，无需任何 API key；唯一需填的是 Telegram 推送（可选，不填则不推送）。
# 缺失字段全部由 src/smc_tracker/config.py 的 dataclass 默认值兜底，可只填关心的项。

# ── Hyperliquid 接入（主网；测试网把 URL 换成 testnet）──────────────────────
hyperliquid:
  rest_url: "https://api.hyperliquid.xyz"
  ws_url: "wss://api.hyperliquid.xyz/ws"
  ping_interval_sec: 50          # WS 保活心跳（HL 要求 <60s）
  reconnect_max_backoff_sec: 30

# 监控的市场（perp coin 名称）
markets:
  - BTC
  - ETH
  - SOL

# 聪明钱地址监控列表（巨鲸/高胜率地址；自动发现门槛抓不到的可手动纳入）
watchlist:
  - address: "0x0000000000000000000000000000000000000000"
    label: "示例地址-填真实地址"
    notional_alert_usd: 100000   # 该地址单笔名义价值告警阈值（USD）

# ── 异动检测阈值 ────────────────────────────────────────────────────────────
detection:
  large_fill_notional_usd: 50000 # 单笔大单阈值
  position_change_pct: 0.10      # 持仓变动 >10% 视为加/减仓事件
  poll_interval_sec: 2.0         # clearinghouseState 兜底轮询间隔
  require_sweep: false           # true=只出有流动性扫荡确认的信号（正期望过滤，但信号变少）

# ── SMC 结构引擎参数 ────────────────────────────────────────────────────────
smc:
  candle_interval: "5m"          # 结构分析所用 K 线周期
  swing_lookback: 3              # 摆动高低点左右各 N 根确认
  fvg_min_gap_pct: 0.0005        # FVG 最小缺口（相对价格）
  history_bars: 500              # 启动时回填的历史 K 线数

# ── 输出 ────────────────────────────────────────────────────────────────────
output:
  console: true
  jsonl_path: "data/signals.jsonl"
  webhook_url: ""                # 留空则不推送；可填 Discord/Slack/通用 webhook
  push_ticker_board: false       # 行情监控板推送（默认关，聚焦核心抓庄）

# ── Telegram 推送（唯一需填的密钥；不填则不推送，监控照常运行）──────────────
# 用法：①@BotFather 建机器人 → 填 bot_token；②建频道把机器人加为管理员；
#       ③chat_id 填频道 @username 或数字 id（-100…）。
telegram:
  bot_token: ""                  # ← 填你的 bot token（切勿提交真实 token）
  chat_id: ""                    # ← 填频道 @username 或数字 id
  api_id: 0                      # MTProto（Telethon 备用，Bot API 不需要）
  api_hash: ""

# ── 飞书(Lark)自定义机器人推送（可选）──────────────────────────────────────
feishu:
  webhook_url: ""
  secret: ""                     # 机器人开签名校验时必填

# ── LLM 前瞻研判（Codex OAuth GPT-5.4，无需 apikey；需本机 `codex login`）──
llm:
  enabled: false                 # 默认关闭；已 codex login 的环境改 true 即用
  command: ["codex", "exec", "--skip-git-repo-check"]
  model: ""                      # 形如 "gpt-5.4"；留空=用 codex 默认/配置档
  timeout_sec: 90                # 单次研判硬超时
  interval_sec: 3600             # 研判频率（秒）
  max_input_chars: 6000          # 喂入摘要的截断上限（控延迟/token）

# ── 信号有效性多时间段(MTF)评估 ─────────────────────────────────────────────
review:
  horizons_min: [5, 15, 30, 60, 240, 720, 1440]   # 7 个评估 TF（事后分 TF 命中率诊断 alpha）

# ── HL 事件分类汇总推送（降噪去刷屏）────────────────────────────────────────
digest:
  enabled: true
  interval_sec: 300              # 汇总卡片推送周期（默认 5 分钟一张）
  max_per_cat: 8                 # 每分类卡片最多明细行数
  urgent_instant: true           # 超级共振/可疑地址仍即时单独推

# ── OKX 永续 streaming（默认关）────────────────────────────────────────────
okx:
  enabled: false
  ws_url: "wss://ws.okx.com:8443/ws/v5/public"
  rest_url: "https://www.okx.com"
  top_n: 20                      # 按 OI 排名监控前 N 个永续
  surge_pct: 0.05                # OI 异动阈值
  symbols: []                    # 指定监控的 coin（空=top_n）

# ── Bitget 永续多周期布林带压力/支撑（Bitget 公开行情接口）──────────────────
bollinger:
  enabled: true
  interval_sec: 900              # 推送周期（默认 15 分钟）
  timeframes: ["15m", "1H", "4H", "12H", "1D", "1W"]
  bars: 1000                     # 每周期 K 线根数（实现层 clamp ≤1999）
  period: 20                     # 布林带均线周期（业界标准 20/2.0）
  k: 2.0                         # 标准差倍数
  top_n: 12                      # 最多监控前 N 个币（按成交额）

# ── Bitget 永续多周期谐波形态（Harmonic Patterns）──────────────────────────
harmonic:
  enabled: true
  interval_sec: 900              # 推送周期（默认 15 分钟）
  timeframes: ["15m", "30m", "1H", "4H", "12H", "1D", "1W"]   # 7 周期
  bars: 2500                     # 每周期保留 bar（大周期取可得历史）
  order: 3                       # 枢轴邻域大小
  tol: 0.05                      # 比率容差（5%）
  top_n: 12                      # 最多监控币种数
  universe_mode: "top_n"         # "top_n"(默认) | "all_perp"(全部 USDT 永续，冷启动回填较慢)
  account_usd: 10000.0           # 仓位计算用账户名义资金（USD）
  risk_pct: 0.01                 # 单笔风险比例（1%）
  target_rr: 2.0                 # 目标盈亏比
  feishu_webhook: ""             # 谐波系统专用独立飞书（空=回退主 notifier）
  feishu_secret: ""
  realtime_ws: false             # 收盘线即触发增量谐波分析（默认关，纯 periodic refresh）
  core_n: 60                     # 核心层币数（每轮必 refresh）
  tail_shards: 8                 # 长尾分片数（round-robin 每轮处理 1 片）

# ── 币种宇宙选择（Bitget 永续）─────────────────────────────────────────────
universe:
  mode: "top_n"                  # "all" | "top_n" | "list"
  top_n: 12
  include: []                    # mode="list" 时指定 coin
  exclude: []                    # 任何 mode 都剔除这些 coin
  asset_filter: "all"            # "all" | "crypto" | "tradfi"

# ── 聪明钱评分权重/封顶（SmartScoreCfg；默认已文档化，一般无需改）──────────
smart_score:
  w_alltime: 28.0                # 全期 PnL 主导（最可靠 edge 证明）
  cap_alltime: 50000000          # 全期 PnL 封顶 5000 万 USD
  w_month: 18.0                  # 近月 PnL（验证持续性）
  cap_month: 10000000
  w_consistency_all: 16.0        # 三窗皆正=持续 edge
  w_consistency_part: 7.0        # 仅月+全期正=过渡
  w_roi: 14.0                    # 月化 ROI=单位本金真实 alpha
  cap_roi_monthly: 0.5           # 月化 50% 封顶
  w_realized: 8.0                # 已实现盈利=真实出金能力
  w_account: 8.0                 # 账户规模=资金认可度
  cap_account: 10000000
  w_winrate: 8.0                 # 胜率辅助（聪明钱常低胜率高盈亏比）
  cap_winrate: 0.7               # 胜率 70% 封顶
  churn_vol_floor: 1000000       # 刷量判别成交额门槛（100 万 USD）
  churn_eff_max: 0.001           # 方向盈亏效率上限（0.1%）
  churn_penalty: 0.85            # 刷量整体折扣（×0.85）
  min_trades_winrate: 20         # 胜率最小样本（Wilson 守卫触发阈）

# ── 地址协同显著性阈值（庄家集团判定）──────────────────────────────────────
correlation:
  min_lift: 2.0                  # 共现强度 ≥2× 随机期望才显著
  max_p: 0.01                    # 二项右尾 p ≤1%（99% 置信非随机）
  min_shared: 3                  # 协同事件至少 3 次
  min_coins: 2                   # 跨 ≥2 币（单币追涨人群隔离；跨币=同一实体硬证据）

# ── 监控币种清单（watchlist-multi-tf）─────────────────────────────────────
# enabled=true：只为清单内币种采集多周期数据，不再监控全市场（采集器/谐波/BB 都改清单驱动）。
# 清单增删：`PYTHONPATH=src ./.venv/bin/python -m smc_tracker watch add BTC ETH`（或 watch rm / watch list），
# 或 dashboard 访问 http://127.0.0.1:8787/monitored 页面增删；运行中热载入（≤1 个采集周期生效）。
# enabled=false（默认）：完全保持现状 all_perp 行为（零回归）。
monitored_coins:
  enabled: false
  timeframes: ["15m", "1H", "4H", "6H", "12H", "1D", "1W"]   # 6H 替代 Bitget 不支持的 8h
  collect_interval_sec: 300
  vol_board_sec: 0      # 实时波动追踪板推送间隔(秒)；0=关闭(opt-in)。逐周期 速度/加速度/σ/ATR/PD 溢价折价。
                        # CLI 离线查看：`-m smc_tracker vol`
