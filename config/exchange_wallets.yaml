# EVM 稳定币流向配置（ETH 主网，keyless 公开 RPC）
# 原理：eth_getLogs 筛 USDT/USDC Transfer，topic[2]=交易所地址=流入；topic[1]=流出。
# block_window/chunk 保守设置，避开公开 RPC 单次结果上限（通常 10000 条）。
evm:
  rpc: "https://ethereum-rpc.publicnode.com"
  block_window: 600       # 扫描窗口(块)，~2h(ETH 12s/块)。保守，避开公开 RPC 大范围/结果上限
  chunk: 150              # 每次 getLogs 块跨度
  stablecoins:
    - {symbol: USDT, contract: "0xdAC17F958D2ee523a2206206994597C13D831ec7", decimals: 6}
    - {symbol: USDC, contract: "0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48", decimals: 6}
  threshold_usd: 2000000  # ETH 稳定币流告警阈值(美元)，默认 $2M
