# SMC 抓庄仪表盘 — nginx 反向代理样例
# 安装: sudo cp deploy/nginx-smc.conf /etc/nginx/sites-available/smc
#       sudo ln -s /etc/nginx/sites-available/smc /etc/nginx/sites-enabled/
#       sudo nginx -t && sudo systemctl reload nginx
# 说明: 仪表盘进程只绑 127.0.0.1:8787，外部访问一律经此反代（可加 TLS / basic auth）。

# 可选：限制访问频率（防爬）
# limit_req_zone $binary_remote_addr zone=smc:10m rate=10r/s;

server {
    listen 80;
    server_name dashboard.example.com;   # ← 改成你的域名或公网 IP

    # 建议上 TLS：用 certbot 自动签发 Let's Encrypt 证书后，
    # 取消下面注释并删除上面的纯 80 监听（或保留 80 做 301 跳转）。
    # listen 443 ssl;
    # ssl_certificate     /etc/letsencrypt/live/dashboard.example.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/dashboard.example.com/privkey.pem;

    # 访问日志
    access_log /var/log/nginx/smc-access.log;
    error_log  /var/log/nginx/smc-error.log;

    # 仪表盘主体（含 /harmonic /hl2 /health /api/*）
    location / {
        # limit_req zone=smc burst=20 nodelay;   # 可选限流
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 仪表盘 5s 自刷新，读超时给足
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # 健康检查端点（监控系统可直接探活，无需鉴权）
    location = /health {
        proxy_pass http://127.0.0.1:8787/health;
        access_log off;
    }
}
